name: Research Company Submission

# Triggered manually from the GitHub Actions UI.
# Workflow:
#   1. You receive a form submission via Formspree (email notification).
#   2. Copy the company name from the email.
#   3. Go to Actions → Research Company Submission → Run workflow.
#   4. Enter the company name (and optional website/notes).
#   5. The research agent runs and opens a draft PR with the new CSV row.
#   6. Review the PR, correct any errors, then merge.
#
# Required repo secret: ANTHROPIC_API_KEY

on:
  workflow_dispatch:
    inputs:
      company_name:
        description: 'Company name (as submitted)'
        required: true
      company_website:
        description: 'Company website (optional — helps the agent)'
        required: false
        default: ''
      submission_notes:
        description: 'Additional context from the submitter (optional)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  research-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Build research context
        id: context
        run: |
          # Include website in the company descriptor when provided so the
          # agent has an extra signal for disambiguation.
          if [ -n "${{ inputs.company_website }}" ]; then
            echo "descriptor=${{ inputs.company_name }} (${{ inputs.company_website }})" >> "$GITHUB_OUTPUT"
          else
            echo "descriptor=${{ inputs.company_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run research agent
        run: |
          echo "${{ steps.context.outputs.descriptor }}" > /tmp/submission.txt
          python agents/research_agent.py \
            --batch /tmp/submission.txt \
            --output /tmp/result.csv
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Append row to companies.csv
        run: |
          # Skip the header line and append the data row.
          tail -n +2 /tmp/result.csv >> public/companies.csv

      - name: Sanitize branch name
        id: branch
        run: |
          safe=$(echo "${{ inputs.company_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '-' \
            | tr -cd 'a-z0-9-')
          echo "name=submissions/${safe}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add company: ${{ inputs.company_name }}"
          branch: ${{ steps.branch.outputs.name }}
          delete-branch: true
          title: "Add company: ${{ inputs.company_name }}"
          body: |
            ## Company Submission

            | Field | Value |
            |---|---|
            | **Company** | ${{ inputs.company_name }} |
            | **Website** | ${{ inputs.company_website || '—' }} |
            | **Submitter notes** | ${{ inputs.submission_notes || '—' }} |

            This PR was auto-generated by the research agent from a form submission.

            **Before merging:**
            - [ ] Verify the company name and ownership status are correct
            - [ ] Check the Parent Company field (`Independent` vs. actual parent)
            - [ ] Confirm manufacturing location if listed
            - [ ] Spot-check any sustainability certifications claimed
            - [ ] Remove any hallucinated or uncertain fields

            _When in doubt, leave a field blank rather than publishing inaccurate data._
          draft: true
          labels: submission
